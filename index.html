<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReqBench — API Testing Workbench</title>
    <meta name="description"
        content="A full-featured API testing tool built with vanilla HTML, CSS, and JavaScript. Send HTTP requests, manage collections, chain requests, and generate code.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="topbar">
        <div class="topbar__brand">
            <div class="topbar__logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="6" fill="url(#logoGrad)" />
                    <path d="M8 10L14 7L20 10V18L14 21L8 18V10Z" stroke="white" stroke-width="1.5" fill="none" />
                    <path d="M14 7V21" stroke="white" stroke-width="1.2" opacity="0.5" />
                    <path d="M8 10L20 18" stroke="white" stroke-width="1.2" opacity="0.3" />
                    <path d="M20 10L8 18" stroke="white" stroke-width="1.2" opacity="0.3" />
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#7c5cfc" />
                            <stop offset="1" stop-color="#4facfe" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="topbar__name">ReqBench</span>
        </div>
</body>

</html>
